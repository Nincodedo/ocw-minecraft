version: "3.8"

services:
  ftb-oceanblock:
    image: itzg/minecraft-server:multiarch
    ports:
    - "25565:25565"
    - "25575:25575"
    - "25575:25575/udp"
    - "24454:24454/udp"
    env_file:
      - motd_override.env
      - docker.env
    environment:
      EULA: 'true'
      TZ: 'America/Chicago'
      DIFFICULTY: 'hard'
      HARDCORE: 'true'
      OPS: 'nincodedo'
      OVERRIDE_SERVER_PROPERTIES: 'true'
      ICON: 'https://cdn.discordapp.com/icons/109466144993210368/a_63bcc148bca7700101d1fb6b9522d638.png'
      OVERRIDE_ICON: 'true'
      MEMORY: '3G'
      FUNCTION_PERMISSION_LEVEL: '4'
      SPAWN_PROTECTION: '0'
      ENABLE_AUTOPAUSE: 'true'
      MAX_TICK_TIME: "-1"
      AUTOPAUSE_TIMEOUT_EST: '30'
      AUTOPAUSE_TIMEOUT_INIT: '120'
      TYPE: 'FTBA'
      REMOVE_OLD_MODS: 'true'
      FTB_MODPACK_ID: '91'
      FTB_MODPACK_VERSION_ID: '2079'
    volumes:
      - ftb_server:/data
      - ftb_mods:/mods
      - ftb_mod_configs:/config
    container_name: ftb-oceanblock
    tty: true
    stdin_open: true
    labels:
      dev.nincodedo.gameservercommander.game: "FTB OceanBlock Minecraft"
volumes:
  ftb_server:
  ftb_mods:
  ftb_mod_configs:
secrets:
  discord_webhook:
    file: ./secrets/discord_webhook.txt
